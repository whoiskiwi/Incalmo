# ============================================================
  # docker-compose.yml -- master assembly map for the range
  # Purpose: tell Docker to build and connect the webserver + database containers in one go
  # ============================================================

  services:                          # [services block] lists which containers to build; each indented item = one container

    database:                        # first container, named database (the one holding the data)
      build: ./database              # look in ./database for a Dockerfile and build this container from it
      networks:                      # which network this container joins
        labnet:                      # joins the labnet network defined below
          ipv4_address: 192.168.201.100   # pin it to this fixed IP.
                                            # Why pinned: webserver's ssh/config hardcodes connecting to
                                            # 192.168.201.100; if the IP doesn't match, lateral movement fails
    webserver:                       # second container, named webserver (the public-facing site, the entry point)
      build: ./webserver             # look in ./webserver for a Dockerfile and build it
                                      # No platform pin: the Dockerfile now picks the Go build matching
                                      # the host chip (TARGETARCH), so this builds natively on both
                                      # Intel (amd64) and Apple Silicon (arm64) -- no emulation, no SIGILL
      networks:                      # which network this joins
        - labnet                     # also joins labnet. This one needs no fixed IP, Docker assigns automatically,
                                      # so the simple dash-list form is enough (different from database above)
      ports:                         # port mapping: "open a hole" from a container-internal port to your Mac
        - "8080:8080"                # left 8080 = port on your Mac, right 8080 = Tomcat port inside the container.
                                      # After mapping you can open http://localhost:8080 in your Mac browser to check the site
      depends_on:                    # declare start order
        - database                   # start database first, then webserver
                                      # (note: only guarantees "container started first", not "sshd ready", but good enough)

  networks:                          # [networks block] defines the network used above
    labnet:                          # network name, must match what services reference above
      driver: bridge                 # use bridge mode -- the most common single-host Docker network type
      ipam:                          # ipam = IP Address Management
        config:
          - subnet: 192.168.201.0/24 # manually specify the subnet = 192.168.201.0 ~ 192.168.201.255.
                                      # must include the 192.168.201.100 pinned to database above,
                                      # otherwise Docker can't hand out that IP
